<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cô Út Pháp Luật 🌸</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap"
        rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h2>🌸👩‍⚖️ Cô Út pháp luật</h2>
        <button id="btn-new-chat">+ Cuộc trò chuyện mới</button>
        <div id="history"></div>
    </div>

    <!-- CHAT -->
    <div id="chat-wrap">
        <div id="chat-header">
            <span>
                <button id="btn-toggle-sidebar">☰</button>
                🌸👩‍⚖️ Cô Út pháp luật
            </span>
            <small>Hỏi gì Cô Út nói đó – đúng luật, dễ hiểu – Tham khảo! 😄</small>
        </div>

        <div id="mode-toggle" class="mode-switch d-none">
            <span class="mode-label">Mặc định</span>
            <label class="switch">
                <input type="checkbox" id="rich-mode">
                <span class="slider"></span>
            </label>
            <span class="mode-label">Tối giản</span>
        </div>

        <!-- WELCOME -->
        <div id="welcome">
            <div class="avatar">👩‍⚖️</div>
            <h3>Xin chào! Cô Út đây 😄</h3>
            <p>Chuyên hỗ trợ thủ tục, thời hạn và quy định pháp luật.<br>Chọn câu hỏi mẫu hoặc tự gõ bên dưới nghen!</p>

            <div class="topic-group">
                <div class="topic-label">🔒 Tạm giữ · Tạm giam</div>
                <div class="sample-grid">
                    <button class="sample-btn">Thời hạn tạm giữ tối đa là bao lâu?</button>
                    <button class="sample-btn">Tạm giam có thể gia hạn mấy lần?</button>
                    <button class="sample-btn">Quyền của người bị tạm giữ là gì?</button>
                    <button class="sample-btn">Ai có thẩm quyền ra lệnh tạm giam?</button>
                </div>
            </div>

            <div class="topic-group">
                <div class="topic-label">🏛️ Thi hành án · Trại giam</div>
                <div class="sample-grid">
                    <button class="sample-btn">Thủ tục nhập trại chấp hành án gồm những gì?</button>
                    <button class="sample-btn">Quy định thăm gặp phạm nhân như thế nào?</button>
                    <button class="sample-btn">Quyền của phạm nhân trong trại giam?</button>
                </div>
            </div>
        </div>

        <!-- TIN NHẮN -->
        <div id="messages" style="display:none;"></div>

        <div id="input-area">
            <input id="user-input" type="text" placeholder="Nhập câu hỏi… VD: Thời hạn tạm giữ tối đa là bao lâu?" />
            <button id="btn-send">➤</button>
        </div>
    </div>

    <div id="particles-js"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

    <!-- Modules: thứ tự quan trọng -->
    <script src="chat-session.js"></script>
    <script src="chat-ui.js"></script>
    <script src="chat-api.js"></script>
    <script src="chat.js"></script>

</body>

</html>
